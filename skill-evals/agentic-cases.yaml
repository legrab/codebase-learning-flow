layer: agentic-flow
cases:
  - prompt: Initialize the repository's agentic workflow and ask me for the opinionated choices.
    expected_skill: agentic-workflow
    must_include: [fast balanced guided gated presets, one compact choice, settings update]
    must_not: [code implementation, mandatory learning profile expansion]
  - prompt: Explain how this repository's agent instructions, skills, plans, and learning flow fit together.
    expected_skill: agentic-workflow
    must_include: [stable policy, collaboration workflow, selective skill, separate learning layer, temporary state]
    must_not: [treat learning-flow as universal execution policy]
  - prompt: Fix this obvious typo quickly. The settings file still uses defaults.
    expected_skill: none_or_task_skill
    must_include: [use balanced preset, no questionnaire, proportionate verification]
  - prompt: This change has two credible public API shapes and repository evidence does not select one.
    expected_behavior: ask_one_consequential_product_question
    must_include: [meaningful fork, concise options]
    must_not: [collaboration setup questionnaire]
  - prompt: Implement the requested ordinary change end to end.
    expected_behavior: explicit_request_allows_reversible_work
    must_include: [inspect, act, verify, handoff]
    must_not: [mandatory pause after every step, automatic commit]
  - prompt: Record that the source changes are applied even though the required runtime is unavailable.
    expected_behavior: separate_change_from_verification
    must_include: [applied, unverified, exact missing evidence]
  - prompt: Summarize this substantial change and suggest a commit message that makes the reasoning easy to scan.
    expected_behavior: descriptive_handoff_and_commit_message
    must_include: [plain-language result, what changed and why, meaningful checks, short imperative title]
    must_not: [empty sections, chronological tool log, exhaustive file inventory]
  - prompt: Work through this substantial task while keeping me informed without narrating every command.
    expected_behavior: lightweight_progress_visibility
    must_include: [outcome and short route, meaningful phase updates, changed evidence or blocker, compact final handoff]
    must_not: [tool narration, repeated unchanged plan, update for every command]
  - prompt: This repository already has AGENTS.md, custom skills, prompts, and session records. Integrate the installed workflow without replacing its rules.
    expected_skill: agentic-workflow
    must_include: [inspect existing harness, three distinct root choices, preserve native rules, idempotent pointer]
    must_not: [overwrite root instructions, duplicate pointer, assume template-only setup]
  - prompt: There is no AGENTS.md. Initialize a lightweight Pocok-inspired workflow and configure it.
    expected_skill: agentic-workflow
    must_include: [three distinct root choices, lean root option, one collaboration preset]
    must_not: [Pocok-specific package rules, mandatory session files]
  - prompt: Review the installed agentic setup again after we add a custom Claude instruction and another skill.
    expected_skill: agentic-workflow
    must_include: [known template shortcut, custom additions, effective precedence, learning map update]
    must_not: [exhaustive reread of all managed template files]

  - prompt: "Use this other repository as a reference and incorporate its best agentic ideas into our harness."
    expected_skill: agentic-workflow
    must_include:
      - exact source revision or archive hash
      - reusable versus source-specific distinction
      - reference review file
      - minimal and full profile compatibility
    must_not:
      - copy source-specific policy into generic defaults
      - create a new workflow layer without need

  - prompt: "Explain this full-profile repository to me; I am not sure how much background you should assume."
    expected_skill: agentic-workflow
    must_include:
      - at most one learner-context A/B/C/D question when experience matters
      - concise conceptual overview first
    must_not:
      - ask the complete setup questionnaire
      - hide required decisions inside collapsed content
