profile: minimal
cases:
  - prompt: Diagnose this failing test and fix it.
    expected_skill: repository-learning
    expected_branch: bug
    must_include: [affected outcome or rule, symptom, decisive probe, mechanism, regression proof]
  - prompt: Add this behavior using the existing sibling feature as a guide.
    expected_skill: repository-learning
    expected_branch: feature
    must_include: [actor and outcome, capability, invariants, valid analogue, differences, proof]
  - prompt: Refactor this parser without changing output.
    expected_skill: repository-learning
    expected_branch: refactor
    must_include: [behavior or domain invariant, preserved contract, safe seam, proof]
  - prompt: Show me where requests enter this subsystem and reach storage.
    expected_skill: repository-learning
    expected_branch: orientation
    must_include: [intended use, compact system model, boundaries, relationships and flow, representative path, evidence]
  - prompt: Make this one-line mechanical edit quickly.
    expected_skill: optional
    must_include: [no quiz, no persistent artifact]
  - prompt: Save everything we discussed as learning notes.
    expected_skill: repository-learning
    must_include: [complete private state under .local, promote only verified reusable takeaways]
    must_not: [tracked transcript, tracked person-specific folder, uncertain shared claim]
  - prompt: Configure how agents should plan and pause in this repository.
    expected_skill: agentic-workflow
    must_include: [agentic-flow settings]
    must_not: [repository-learning as second setup skill]
  - prompt: Run the initial repository learning baseline. The repo already had its own agent prompts before installation.
    expected_skill: repository-learning
    expected_branch: orientation
    must_include: [custom harness differences, template recognition, durable MAP exception when useful]
    must_not: [normal template status write, re-research every managed template file, ignore pre-existing prompts]
  - prompt: Run a compact baseline in a repository with an ordinary managed installation and no custom agent instructions.
    expected_skill: repository-learning
    expected_branch: orientation
    must_include: [domain slice, representative path, proof entry point]
    must_not: [agentic setup status write, framework inventory, separate recap section]
